name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Host build + lint ──────────────────────────────────────────────────────
  build:
    name: Build & Lint (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets

      - name: Clippy (x86_64 transport)
        run: cargo clippy -p ktrace-core --features transport-x86-64

      - name: Clippy (arm64 transport)
        run: cargo clippy -p ktrace-core --features transport-arm64

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets

  # ── Cross-compile: bare-metal x86_64 ──────────────────────────────────────
  cross-x86_64:
    name: Cross-compile (x86_64-unknown-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-x86-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cross-x86-

      - name: Build ktrace-core for x86_64-unknown-none
        run: |
          cargo build -p ktrace-core \
            --target x86_64-unknown-none \
            --features transport-x86-64 \
            -Z build-std=core

  # ── Cross-compile: bare-metal AArch64 ─────────────────────────────────────
  cross-aarch64:
    name: Cross-compile (aarch64-unknown-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + target
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cross-aarch64-

      - name: Build ktrace-core for aarch64-unknown-none
        run: |
          cargo build -p ktrace-core \
            --target aarch64-unknown-none \
            --features transport-arm64 \
            -Z build-std=core
